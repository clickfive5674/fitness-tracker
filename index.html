<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title># Daily Workout</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  /* ── Design tokens ─── 奶白底 + 珊瑚橘主色 + 薄荷綠輔色 ── */
  :root {
    --bg:         #f7f5f2;        /* 溫暖奶白 */
    --surface:    #ffffff;
    --card:       #ffffff;
    --border:     #e8e3dc;
    --border-md:  #d4cdc4;
    --muted:      #c5bdb3;
    --text-dim:   #9e948a;
    --text:       #4a3f38;
    --text-hi:    #1e1612;

    --coral:      #f2704a;        /* 珊瑚橘 — 主色 */
    --coral-lo:   #fdeee9;
    --coral-mid:  #fbd5c8;
    --mint:       #3dbfa0;        /* 薄荷綠 — 輔色 */
    --mint-lo:    #e2f7f3;
    --gold:       #f0a83a;        /* 金黃 — 早晨 */
    --gold-lo:    #fef5e2;
    --indigo:     #6878f0;        /* 靛紫 — 晚間 */
    --indigo-lo:  #eef0fd;
    --red:        #e85454;

    --shadow-sm:  0 1px 3px rgba(74,63,56,.07), 0 1px 2px rgba(74,63,56,.04);
    --shadow-md:  0 4px 16px rgba(74,63,56,.09), 0 1px 4px rgba(74,63,56,.05);

    --mono: 'DM Mono', monospace;
    --sans: 'Noto Sans TC', sans-serif;
    --tab-h: 64px;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    overscroll-behavior: none;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Layout ── */
  #app { display: flex; flex-direction: column; min-height: 100dvh; }

  /* ── Top bar ── */
  .top-bar {
    position: sticky; top: 0; z-index: 40;
    background: rgba(247,245,242,.92);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--border);
    padding: 13px 20px 11px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .top-bar-left { display: flex; align-items: center; gap: 10px; }
  .logo-pill {
    background: linear-gradient(135deg, var(--coral), #f5553a);
    color: #fff; font-size: 13px; font-weight: 700;
    padding: 5px 11px; border-radius: 20px; letter-spacing: .01em;
  }
  .top-bar h1 { font-size: 15px; font-weight: 700; color: var(--text-hi); }
  .date-chip {
    font-family: var(--mono); font-size: 10.5px; color: var(--text-dim);
    background: var(--surface); border: 1px solid var(--border);
    padding: 4px 10px; border-radius: 20px; letter-spacing: .04em;
    box-shadow: var(--shadow-sm);
  }
  .sync-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--mint); display: inline-block; margin-right: 7px;
    animation: pulse-dot 2.5s ease-in-out infinite;
  }
  @keyframes pulse-dot { 0%,100%{opacity:1}50%{opacity:.25} }

  /* ── Tab panels ── */
  .tab-panel { display: none; flex: 1; overflow-y: auto; padding: 18px 14px calc(var(--tab-h) + 24px); }
  .tab-panel.active { display: block; }

  /* ── Bottom nav ── */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
    height: var(--tab-h);
    background: rgba(255,255,255,.96);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border-top: 1px solid var(--border);
    display: flex;
    padding-bottom: env(safe-area-inset-bottom);
    box-shadow: 0 -2px 12px rgba(74,63,56,.06);
  }
  .nav-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 3px; cursor: pointer;
    border: none; background: transparent; padding: 0;
    color: var(--muted); font-size: 10px; font-weight: 500;
    font-family: var(--sans); transition: color .15s;
  }
  .nav-btn svg { width: 22px; height: 22px; stroke-width: 1.7; transition: stroke .15s; }
  .nav-btn.active { color: var(--coral); }
  .nav-btn.active svg { stroke: var(--coral); }
  .nav-btn .nav-dot {
    width: 4px; height: 4px; border-radius: 50%;
    background: var(--coral); margin: 0 auto;
    opacity: 0; transition: opacity .15s;
  }
  .nav-btn.active .nav-dot { opacity: 1; }

  /* ── Cards ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 12px;
    box-shadow: var(--shadow-sm);
    transition: box-shadow .2s;
  }
  .card:hover { box-shadow: var(--shadow-md); }
  .card-header { display: flex; align-items: center; gap: 11px; margin-bottom: 16px; }
  .card-icon {
    width: 38px; height: 38px; border-radius: 11px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .icon-morning { background: var(--gold-lo); }
  .icon-workout { background: var(--coral-lo); }
  .icon-bedtime { background: var(--indigo-lo); }
  .icon-menu    { background: var(--mint-lo); }
  .icon-chart   { background: #fce8f5; }

  .card-label {
    font-size: 14px; font-weight: 700; color: var(--text-hi); letter-spacing: -.01em;
  }
  .card-sublabel { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

  /* ── Section divider ── */
  .section-divider {
    display: flex; align-items: center; gap: 10px; margin: 22px 0 14px;
  }
  .section-divider::before, .section-divider::after {
    content:''; flex:1; height:1px; background: var(--border);
  }
  .section-tag {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; font-weight: 700; letter-spacing: .06em;
    color: var(--text-dim); white-space: nowrap; padding: 3px 10px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; box-shadow: var(--shadow-sm);
  }
  .section-tag .dot {
    width: 6px; height: 6px; border-radius: 50%;
  }

  /* ── Form elements ── */
  .field { margin-bottom: 13px; }
  .field label {
    display: block; font-size: 11.5px; font-weight: 700; color: var(--text-dim);
    margin-bottom: 6px; letter-spacing: .04em;
  }
  .field input, .field textarea {
    width: 100%; background: var(--bg);
    border: 1.5px solid var(--border); border-radius: 10px;
    padding: 12px 14px; font-family: var(--sans); font-size: 15px; color: var(--text-hi);
    outline: none; transition: border-color .15s, box-shadow .15s, background .15s;
    -webkit-appearance: none; appearance: none;
  }
  .field input:focus, .field textarea:focus {
    border-color: var(--coral); background: #fff;
    box-shadow: 0 0 0 3px var(--coral-mid);
  }
  .field input[type=number] { font-family: var(--mono); font-size: 17px; font-weight: 500; }
  .field textarea { resize: none; min-height: 88px; line-height: 1.6; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* ── Input unit badge ── */
  .input-wrap { position: relative; }
  .input-unit {
    position: absolute; right: 13px; top: 50%; transform: translateY(-50%);
    font-size: 11px; color: var(--muted); font-family: var(--mono); pointer-events: none;
  }
  .input-wrap input { padding-right: 38px; }

  /* ── Checkbox list ── */
  .check-list { display: flex; flex-direction: column; gap: 8px; }
  .check-item {
    display: flex; align-items: flex-start; gap: 11px;
    padding: 12px 14px; border-radius: 11px;
    background: var(--bg); border: 1.5px solid var(--border);
    cursor: pointer; transition: border-color .15s, background .15s;
    -webkit-user-select: none; user-select: none;
  }
  .check-item.checked { border-color: var(--coral); background: var(--coral-lo); }
  .check-item input[type=checkbox] { display: none; }
  .check-box {
    width: 20px; height: 20px; border-radius: 6px; flex-shrink: 0;
    border: 2px solid var(--border-md); display: flex; align-items: center; justify-content: center;
    transition: background .15s, border-color .15s; margin-top: 1px; background: #fff;
  }
  .check-item.checked .check-box { background: var(--coral); border-color: var(--coral); }
  .check-box svg { width: 11px; height: 11px; stroke: white; stroke-width: 3; display: none; }
  .check-item.checked .check-box svg { display: block; }
  .check-label { font-size: 13.5px; color: var(--text); line-height: 1.5; }
  .check-item.checked .check-label { color: var(--text-dim); text-decoration: line-through; }

  /* ── Routine preview ── */
  .routine-preview {
    background: var(--bg); border: 1.5px solid var(--border);
    border-radius: 10px; padding: 13px 14px;
    font-size: 12.5px; line-height: 1.8; color: var(--text-dim);
    white-space: pre-wrap; font-family: var(--mono);
  }

  /* ── Buttons ── */
  .btn {
    display: flex; align-items: center; justify-content: center; gap: 7px;
    width: 100%; padding: 14px; border-radius: 12px;
    font-size: 15px; font-weight: 700; border: none; cursor: pointer;
    transition: opacity .15s, transform .1s, box-shadow .15s;
    font-family: var(--sans); -webkit-appearance: none; letter-spacing: .01em;
  }
  .btn:active { transform: scale(.97); }
  .btn-coral   { background: linear-gradient(135deg, var(--coral), #f0512d); color: #fff; box-shadow: 0 4px 14px rgba(242,112,74,.35); }
  .btn-coral:active { box-shadow: 0 2px 6px rgba(242,112,74,.25); }
  .btn-mint    { background: linear-gradient(135deg, var(--mint), #2ba88c); color: #fff; box-shadow: 0 4px 14px rgba(61,191,160,.3); }
  .btn-gold    { background: linear-gradient(135deg, var(--gold), #e89520); color: #fff; box-shadow: 0 4px 14px rgba(240,168,58,.35); }
  .btn-outline { background: #fff; border: 1.5px solid var(--border); color: var(--text); box-shadow: var(--shadow-sm); }
  .btn-outline:active { background: var(--bg); }

  /* ── Toast ── */
  #toast {
    position: fixed; bottom: calc(var(--tab-h) + 14px); left: 50%;
    transform: translateX(-50%) translateY(16px);
    font-size: 13px; font-weight: 600; font-family: var(--sans);
    padding: 10px 20px; border-radius: 40px; z-index: 100;
    opacity: 0; transition: opacity .22s, transform .22s;
    pointer-events: none; white-space: nowrap;
    box-shadow: 0 4px 16px rgba(0,0,0,.12);
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast.ok   { background: var(--mint); color: #fff; }
  #toast.err  { background: var(--red); color: #fff; }

  /* ── Analytics: stat boxes ── */
  .stat-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 12px; }
  .stat-box {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 14px 10px 12px;
    text-align: center; box-shadow: var(--shadow-sm);
  }
  .stat-val { font-family: var(--mono); font-size: 22px; font-weight: 500; color: var(--text-hi); }
  .stat-lbl { font-size: 10px; color: var(--text-dim); margin-top: 3px; letter-spacing: .04em; font-weight: 600; }
  .stat-accent-coral .stat-val { color: var(--coral); }
  .stat-accent-mint  .stat-val { color: var(--mint); }
  .stat-accent-gold  .stat-val { color: var(--gold); }

  /* ── Chart wrap ── */
  .chart-wrap { position: relative; width: 100%; height: 200px; }

  /* ── Progress ring ── */
  .ring-wrap { display: flex; flex-direction: column; align-items: center; padding: 6px 0 2px; }
  .ring-svg { width: 130px; height: 130px; }
  .ring-track { fill: none; stroke: var(--border); stroke-width: 10; }
  .ring-fill { fill: none; stroke-width: 10; stroke-linecap: round;
    transform-origin: 50% 50%; transform: rotate(-90deg);
    transition: stroke-dashoffset .9s cubic-bezier(.4,0,.2,1), stroke .4s; }
  .ring-pct  { font-family: var(--mono); font-size: 20px; font-weight: 500; fill: var(--text-hi); }
  .ring-sub  { font-family: var(--sans); font-size: 10px; fill: var(--text-dim); font-weight: 600; }

  /* ── Menu textareas ── */
  .menu-textarea {
    width: 100%; background: var(--bg); border: 1.5px solid var(--border);
    border-radius: 10px; padding: 13px 14px;
    font-family: var(--mono); font-size: 12.5px; color: var(--text);
    outline: none; resize: none; min-height: 120px; line-height: 1.7;
    transition: border-color .15s, box-shadow .15s;
  }
  .menu-textarea:focus { border-color: var(--coral); box-shadow: 0 0 0 3px var(--coral-mid); background: #fff; }
  .field-label { font-size: 11.5px; font-weight: 700; color: var(--text-dim); margin-bottom: 7px; letter-spacing: .04em; display: block; }

  /* ── Saved badge ── */
  .saved-badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11px; font-weight: 600; color: var(--mint);
    background: var(--mint-lo); padding: 3px 10px; border-radius: 20px;
    opacity: 0; transition: opacity .3s;
  }
  .saved-badge.show { opacity: 1; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-md); border-radius: 4px; }
</style>
</head>
<body>

<div id="app">

  <!-- Top bar -->
  <div class="top-bar">
    <div class="top-bar-left">
      <div class="logo-pill">💪 健康</div>
      <span class="sync-dot"></span>
    </div>
    <div class="date-chip" id="todayChip"></div>
  </div>


  <!-- ══════════════════════════════
       TAB 1 — 今日紀錄
  ══════════════════════════════ -->
  <div class="tab-panel active" id="tab-today">

    <!-- A. 早晨 -->
    <div class="section-divider">
      <div class="section-tag"><span class="dot" style="background:var(--gold)"></span>早晨</div>
    </div>
    <div class="card">
      <div class="card-header">
        <div class="card-icon icon-morning">🌤️</div>
        <div>
          <div class="card-label">晨間量測</div>
          <div class="card-sublabel" id="morning-time-display"></div>
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>體重（公斤）</label>
          <div class="input-wrap">
            <input id="m-weight" type="number" inputmode="decimal" placeholder="70.5" step="0.1">
            <span class="input-unit">kg</span>
          </div>
        </div>
        <div class="field">
          <label>心率（bpm）</label>
          <div class="input-wrap">
            <input id="m-hr" type="number" inputmode="numeric" placeholder="58">
            <span class="input-unit">bpm</span>
          </div>
        </div>
      </div>
      <button class="btn btn-gold" onclick="submitMorning()">📋 儲存早晨紀錄</button>
    </div>

    <!-- B. 訓練 -->
    <div class="section-divider">
      <div class="section-tag"><span class="dot" style="background:var(--coral)"></span>訓練</div>
    </div>
    <div class="card">
      <div class="card-header">
        <div class="card-icon icon-workout">⚡</div>
        <div>
          <div class="card-label">今日課表</div>
          <div class="card-sublabel">來自菜單設定</div>
        </div>
      </div>

      <span class="field-label">肌力訓練</span>
      <div class="routine-preview" id="strength-preview-today" style="margin-bottom:14px;"></div>

      <span class="field-label" style="margin-bottom:8px;display:block;">完成打勾</span>
      <div class="check-list" id="exercise-checklist"></div>

      <div style="height:16px;"></div>
      <span class="field-label">有氧規劃</span>
      <div class="routine-preview" id="cardio-preview-today" style="margin-bottom:12px;"></div>

      <div class="field">
        <label>有氧時間（分鐘）</label>
        <div class="input-wrap">
          <input id="w-cardio" type="number" inputmode="numeric" placeholder="35">
          <span class="input-unit">min</span>
        </div>
      </div>
      <div class="field">
        <label>備註 / 感受</label>
        <textarea id="w-notes" placeholder="今天狀態如何？體力、不適、心情…"></textarea>
      </div>
      <button class="btn btn-coral" onclick="submitWorkout()">⚡ 儲存訓練紀錄</button>
    </div>

    <!-- C. 就寢 -->
    <div class="section-divider">
      <div class="section-tag"><span class="dot" style="background:var(--indigo)"></span>就寢</div>
    </div>
    <div class="card">
      <div class="card-header">
        <div class="card-icon icon-bedtime">🌙</div>
        <div>
          <div class="card-label">睡前量測</div>
          <div class="card-sublabel">一日結束體重</div>
        </div>
      </div>
      <div class="field">
        <label>體重（公斤）</label>
        <div class="input-wrap">
          <input id="b-weight" type="number" inputmode="decimal" placeholder="71.2" step="0.1">
          <span class="input-unit">kg</span>
        </div>
      </div>
      <button class="btn btn-outline" onclick="submitBedtime()">🌙 儲存就寢紀錄</button>
    </div>

  </div>


  <!-- ══════════════════════════════
       TAB 2 — 菜單設定
  ══════════════════════════════ -->
  <div class="tab-panel" id="tab-menu">

    <div class="card" style="margin-top:4px;">
      <div class="card-header">
        <div class="card-icon icon-workout">💪</div>
        <div>
          <div class="card-label">肌力菜單</div>
          <div class="card-sublabel">顯示於今日訓練區塊</div>
        </div>
      </div>
      <span class="field-label">訓練內容</span>
      <textarea class="menu-textarea" id="strength-menu" rows="7"></textarea>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-icon" style="background:var(--mint-lo);">🏃</div>
        <div>
          <div class="card-label">有氧菜單</div>
          <div class="card-sublabel">顯示於今日有氧區塊</div>
        </div>
      </div>
      <span class="field-label">訓練指引</span>
      <textarea class="menu-textarea" id="cardio-menu" rows="4"></textarea>
    </div>

    <div style="display:flex;align-items:center;gap:12px;padding:0 2px 4px;">
      <button class="btn btn-coral" style="flex:1;" onclick="saveMenus()">儲存菜單</button>
      <span class="saved-badge" id="menu-saved-badge">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>已儲存
      </span>
    </div>
    </div>

  </div>


  <!-- ══════════════════════════════
       TAB 3 — 數據分析
  ══════════════════════════════ -->
  <div class="tab-panel" id="tab-analytics">

    <div class="stat-row" style="margin-top:4px;">
      <div class="stat-box stat-accent-gold">
        <div class="stat-val" id="stat-avg-weight">—</div>
        <div class="stat-lbl">平均體重</div>
      </div>
      <div class="stat-box stat-accent-coral">
        <div class="stat-val" id="stat-avg-hr">—</div>
        <div class="stat-lbl">平均心率</div>
      </div>
      <div class="stat-box stat-accent-mint">
        <div class="stat-val" id="stat-sessions">—</div>
        <div class="stat-lbl">本週訓練</div>
      </div>
    </div>

    <!-- 體重趨勢 -->
    <div class="card">
      <div class="card-header">
        <div class="card-icon icon-morning">⚖️</div>
        <div>
          <div class="card-label">體重趨勢</div>
          <div class="card-sublabel">早晨 vs 就寢 · 近90天</div>
        </div>
      </div>
      <div class="chart-wrap"><canvas id="weightChart"></canvas></div>
    </div>

    <!-- 靜息心率 -->
    <div class="card">
      <div class="card-header">
        <div class="card-icon" style="background:#ffe4e4;">❤️</div>
        <div>
          <div class="card-label">靜息心率</div>
          <div class="card-sublabel">早晨趨勢 · 近90天</div>
        </div>
      </div>
      <div class="chart-wrap"><canvas id="hrChart"></canvas></div>
    </div>

    <!-- 每週有氧 -->
    <div class="card">
      <div class="card-header">
        <div class="card-icon" style="background:var(--mint-lo);">🏃</div>
        <div>
          <div class="card-label">本週有氧進度</div>
          <div class="card-sublabel">目標：150 分鐘</div>
        </div>
      </div>
      <div class="ring-wrap">
        <svg class="ring-svg" viewBox="0 0 130 130">
          <circle class="ring-track" cx="65" cy="65" r="53"/>
          <circle class="ring-fill" id="ring-fill" cx="65" cy="65" r="53"
            stroke="var(--coral)" stroke-dasharray="333" stroke-dashoffset="333"/>
          <text class="ring-pct" x="65" y="61" text-anchor="middle" dominant-baseline="middle" id="ring-mins">—</text>
          <text class="ring-sub" x="65" y="79" text-anchor="middle" id="ring-label">/ 150 分鐘</text>
        </svg>
      </div>
      <div class="chart-wrap" style="height:155px;margin-top:6px;"><canvas id="cardioChart"></canvas></div>
    </div>

    <div style="text-align:center;padding:10px 0 4px;">
      <button class="btn btn-outline" style="max-width:200px;" onclick="refreshAnalytics()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        從試算表重新整理
      </button>
    </div>

  </div>


  <!-- Bottom nav -->
  <nav class="bottom-nav">
    <button class="nav-btn active" id="nav-today" onclick="switchTab('today')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      今日
      <div class="nav-dot"></div>
    </button>
    <button class="nav-btn" id="nav-menu" onclick="switchTab('menu')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      菜單
      <div class="nav-dot"></div>
    </button>
    <button class="nav-btn" id="nav-analytics" onclick="switchTab('analytics')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      分析
      <div class="nav-dot"></div>
    </button>
  </nav>

</div>

<!-- Toast -->
<div id="toast"></div>

<script>
/* ══════════════════════════════════════════════════════
   設定 — 請替換為你的 Apps Script 網址
══════════════════════════════════════════════════════ */
const WEBHOOK_URL = 'https://script.google.com/macros/s/AKfycbxp_F_xP_WCm-C3Df-1dUyDJncujokD3fWmNT7O_xZfJGYlnULQ-Jo422S5Z0z0orzL/exec';
const CONFIG = {
  VITALS_WEBHOOK:   WEBHOOK_URL,
  WORKOUTS_WEBHOOK: WEBHOOK_URL,
};

/* ── 預設菜單 ── */
const DEFAULT_STRENGTH = `每週2次：
1. 四足跪姿呼吸穩定 6–8次呼吸 × 3組
2. 保加利亞分腿蹲 12次 × 3組
3. 羅馬尼亞硬舉 10次 × 3組
4. 伏地挺身變化式 10–15次 × 3組
5. 帕洛夫推壓 12次 × 3組`;

const DEFAULT_CARDIO = `每週4–5次，30–40分鐘
心率目標：130–140 bpm
方式：快走/慢跑、腳踏車或划船機`;

/* ── 狀態 ── */
let state = {
  strengthMenu: localStorage.getItem('strengthMenu') || DEFAULT_STRENGTH,
  cardioMenu:   localStorage.getItem('cardioMenu')   || DEFAULT_CARDIO,
};

/* ══════════════════════════════════════════════════════
   初始化
══════════════════════════════════════════════════════ */
function init() {
  const now = new Date();
  document.getElementById('todayChip').textContent =
    now.toLocaleDateString('zh-TW', { weekday:'short', month:'numeric', day:'numeric' });
  document.getElementById('morning-time-display').textContent =
    '目前時間 ' + now.toLocaleTimeString('zh-TW', { hour:'2-digit', minute:'2-digit' });

  document.getElementById('strength-menu').value = state.strengthMenu;
  document.getElementById('cardio-menu').value   = state.cardioMenu;
  renderTodayRoutine();
  renderExerciseChecklist();
  initCharts();
}

/* ══════════════════════════════════════════════════════
   課表渲染
══════════════════════════════════════════════════════ */
function renderTodayRoutine() {
  document.getElementById('strength-preview-today').textContent = state.strengthMenu;
  document.getElementById('cardio-preview-today').textContent   = state.cardioMenu;
}

function renderExerciseChecklist() {
  const list = document.getElementById('exercise-checklist');
  list.innerHTML = '';
  const lines = state.strengthMenu.split('\n')
    .map(l => l.replace(/^\d+\.\s*/, '').trim())
    .filter(l => l && !/^每週/.test(l));

  lines.forEach((line) => {
    const item = document.createElement('div');
    item.className = 'check-item';
    item.innerHTML = `
      <div class="check-box">
        <svg viewBox="0 0 12 12" fill="none" stroke="currentColor"><polyline points="2 6 5 9 10 3"/></svg>
      </div>
      <span class="check-label">${line}</span>`;
    // 直接監聽 div，不再有 label/checkbox 的雙重觸發問題
    item.addEventListener('click', () => item.classList.toggle('checked'));
    list.appendChild(item);
  });
}

/* ══════════════════════════════════════════════════════
   菜單儲存
══════════════════════════════════════════════════════ */
async function saveMenus() {
  state.strengthMenu = document.getElementById('strength-menu').value;
  state.cardioMenu   = document.getElementById('cardio-menu').value;
  localStorage.setItem('strengthMenu', state.strengthMenu);
  localStorage.setItem('cardioMenu',   state.cardioMenu);
  renderTodayRoutine();
  renderExerciseChecklist();

  // 同步菜單到 Google Sheets（menu 工作表）
  const url = CONFIG.VITALS_WEBHOOK || CONFIG.WORKOUTS_WEBHOOK;
  if (url) {
    await sendToSheet(url, {
      sheet: 'Menu',
      updatedAt: new Date().toLocaleString('zh-TW'),
      strengthMenu: state.strengthMenu,
      cardioMenu:   state.cardioMenu
    });
  }

  const badge = document.getElementById('menu-saved-badge');
  badge.classList.add('show');
  setTimeout(() => badge.classList.remove('show'), 2500);
}



/* ══════════════════════════════════════════════════════
   提交紀錄
══════════════════════════════════════════════════════ */
async function submitMorning() {
  const weight = document.getElementById('m-weight').value;
  const hr     = document.getElementById('m-hr').value;
  if (!weight && !hr) { showToast('請至少填入一個數值', true); return; }
  const now = new Date();
  await sendToSheet(CONFIG.VITALS_WEBHOOK, {
    sheet: 'Vitals', date: formatDate(now), time: formatTime(now),
    type: 'morning', weight: weight||'', heartRate: hr||''
  });
  document.getElementById('m-weight').value = '';
  document.getElementById('m-hr').value = '';
  showToast('早晨紀錄已儲存 ☀️');
}

async function submitWorkout() {
  const cardio = document.getElementById('w-cardio').value;
  const notes  = document.getElementById('w-notes').value;
  const checked = [...document.querySelectorAll('.check-item.checked .check-label')]
    .map(el => el.textContent).join('；');
  const now = new Date();
  await sendToSheet(CONFIG.WORKOUTS_WEBHOOK, {
    sheet: 'Workouts', date: formatDate(now), time: formatTime(now),
    completedExercises: checked, cardioMinutes: cardio||0, notes
  });
  document.getElementById('w-cardio').value = '';
  document.getElementById('w-notes').value  = '';
  document.querySelectorAll('.check-item.checked').forEach(el => el.classList.remove('checked'));
  showToast('訓練紀錄已儲存 ⚡');
}

async function submitBedtime() {
  const weight = document.getElementById('b-weight').value;
  if (!weight) { showToast('請填入就寢體重', true); return; }
  const now = new Date();
  await sendToSheet(CONFIG.VITALS_WEBHOOK, {
    sheet: 'Vitals', date: formatDate(now), time: formatTime(now),
    type: 'bedtime', weight, heartRate: ''
  });
  document.getElementById('b-weight').value = '';
  showToast('就寢紀錄已儲存 🌙');
}

/* ══════════════════════════════════════════════════════
   Google Sheets 同步
══════════════════════════════════════════════════════ */
async function sendToSheet(url, data) {
  try {
    await fetch(url, {
      method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
  } catch (e) { console.error('[Sheets] 同步失敗：', e); }
}

/*
  ─── Apps Script 範本（貼入 GAS 編輯器，部署為網頁應用程式）────
  function doPost(e) {
    const data = JSON.parse(e.postData.contents);
    const ss = SpreadsheetApp.getActiveSpreadsheet();
    const sheet = ss.getSheetByName(data.sheet) || ss.insertSheet(data.sheet);
    if (data.sheet === 'Vitals') {
      sheet.appendRow([data.date, data.time, data.type, data.weight, data.heartRate]);
    } else {
      sheet.appendRow([data.date, data.time, data.completedExercises, data.cardioMinutes, data.notes]);
    }
    return ContentService.createTextOutput('ok');
  }
*/

/* ══════════════════════════════════════════════════════
   圖表設定
══════════════════════════════════════════════════════ */
const CHART_OPTS = {
  responsive: true, maintainAspectRatio: false,
  plugins: { legend: { labels: { color: '#9e948a', font: { family: "'Noto Sans TC'", size: 11 }, boxWidth: 10, padding: 14 } } },
  scales: {
    x: { ticks: { color: '#9e948a', font: { size: 10, family: "'DM Mono'" } }, grid: { color: '#e8e3dc' } },
    y: { ticks: { color: '#9e948a', font: { size: 10, family: "'DM Mono'" } }, grid: { color: '#e8e3dc' } }
  }
};

let weightChart, hrChart, cardioChart;

/* ── 初始化空白圖表（頁面載入時）── */
function initCharts() {
  const wCtx = document.getElementById('weightChart').getContext('2d');
  weightChart = new Chart(wCtx, {
    type: 'line',
    data: { labels: [], datasets: [
      { label:'早晨體重', data:[], borderColor:'#f0a83a', backgroundColor:'#f0a83a18',
        pointRadius:4, pointBackgroundColor:'#f0a83a', tension:.35, fill:true },
      { label:'就寢體重', data:[], borderColor:'#6878f0', backgroundColor:'#6878f018',
        pointRadius:4, pointBackgroundColor:'#6878f0', tension:.35, fill:true }
    ]},
    options: { ...CHART_OPTS, scales: { ...CHART_OPTS.scales,
      y: { ...CHART_OPTS.scales.y, ticks:{ ...CHART_OPTS.scales.y.ticks, callback: v => v+' kg' } } } }
  });

  const hCtx = document.getElementById('hrChart').getContext('2d');
  hrChart = new Chart(hCtx, {
    type: 'line',
    data: { labels: [], datasets: [
      { label:'晨間心率', data:[], borderColor:'#f2704a', backgroundColor:'#f2704a18',
        pointRadius:4, pointBackgroundColor:'#f2704a', tension:.35, fill:true }
    ]},
    options: { ...CHART_OPTS,
      plugins: { ...CHART_OPTS.plugins, legend:{ display:false } },
      scales: { ...CHART_OPTS.scales, y: { ...CHART_OPTS.scales.y,
        ticks:{ ...CHART_OPTS.scales.y.ticks, callback: v => v+' bpm' } } } }
  });

  const cCtx = document.getElementById('cardioChart').getContext('2d');
  cardioChart = new Chart(cCtx, {
    type: 'bar',
    data: { labels: [], datasets: [
      { label:'有氧時間', data:[], backgroundColor:[], borderRadius:7, borderSkipped:false }
    ]},
    options: { ...CHART_OPTS,
      plugins: { ...CHART_OPTS.plugins, legend:{ display:false } },
      scales: { ...CHART_OPTS.scales, y: { ...CHART_OPTS.scales.y,
        ticks:{ ...CHART_OPTS.scales.y.ticks, callback: v => v+'分' } } } }
  });

  updateRing(0, 150);

}

/* ── 用真實資料更新圖表 ── */
function renderCharts(vitals, workouts) {

  // ── 整理近14天的 vitals（依日期排序）──
  const sorted = [...vitals].sort((a,b) => String(a.date).localeCompare(String(b.date)));
  const last90 = sorted.slice(-90);

  // 日期標籤（月/日）
  const dateLabel = d => {
    const s = String(d);
    // 支援 yyyy-mm-dd 或 Google Sheets 序列數字格式
    if (s.includes('-')) {
      const parts = s.split('-');
      return `${parseInt(parts[1])}/${parseInt(parts[2])}`;
    }
    // Google Sheets 日期序號轉換（從1899-12-30起算）
    const jsDate = new Date((Number(s) - 25569) * 86400 * 1000);
    return `${jsDate.getMonth()+1}/${jsDate.getDate()}`;
  };

  // 取出每天早晨/就寢資料（一天可能多筆，取最後一筆）
  const byDate = {};
  last90.forEach(r => {
    const d = String(r.date);
    if (!byDate[d]) byDate[d] = {};
    if (String(r.type).toLowerCase().includes('morning') ||
        String(r.type).toLowerCase().includes('early') ||
        r.type === 'morning') {
      byDate[d].morning = r;
    }
    if (String(r.type).toLowerCase().includes('bed') ||
        r.type === 'bedtime') {
      byDate[d].bedtime = r;
    }
  });

  const dates      = Object.keys(byDate).sort();
  const labels     = dates.map(dateLabel);
  const morningW   = dates.map(d => byDate[d].morning?.weight  || null);
  const bedtimeW   = dates.map(d => byDate[d].bedtime?.weight  || null);
  const morningHR  = dates.map(d => byDate[d].morning?.heartRate || null);

  // 更新體重圖
  weightChart.data.labels = labels;
  weightChart.data.datasets[0].data = morningW;
  weightChart.data.datasets[1].data = bedtimeW;
  weightChart.update();

  // 更新心率圖
  hrChart.data.labels = labels;
  hrChart.data.datasets[0].data = morningHR;
  hrChart.update();

  // ── 整理本週有氧（本週一到今天）──
  const now = new Date();
  const dayOfWeek = now.getDay(); // 0=日
  const monday = new Date(now);
  monday.setDate(now.getDate() - (dayOfWeek === 0 ? 6 : dayOfWeek - 1));
  monday.setHours(0,0,0,0);

  const weekDays = Array.from({length:7}, (_,i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    return d;
  });
  const weekLabels = weekDays.map(d => `${d.getMonth()+1}/${d.getDate()}`);

  // 把 workouts 的日期全部統一成 yyyy-mm-dd 字串
  const normalizeDate = d => {
    const s = String(d);
    if (s.includes('-')) return s.slice(0,10);
    const jsDate = new Date((Number(s) - 25569) * 86400 * 1000);
    return jsDate.toISOString().slice(0,10);
  };

  const weekCardio = weekDays.map(day => {
    const key = day.toISOString().slice(0,10);
    return workouts
      .filter(w => normalizeDate(w.date) === key)
      .reduce((sum, w) => sum + (parseFloat(w.cardioMinutes) || 0), 0);
  });

  const weekTotal = weekCardio.reduce((a,b) => a+b, 0);

  cardioChart.data.labels = weekLabels;
  cardioChart.data.datasets[0].data = weekCardio;
  cardioChart.data.datasets[0].backgroundColor = weekCardio.map(v => v > 0 ? '#3dbfa0cc' : '#e8e3dc');
  cardioChart.update();

  updateRing(weekTotal, 150);

  // ── 統計數字 ──
  const allMorningW = vitals.filter(r => r.type === 'morning' && r.weight).map(r => parseFloat(r.weight));
  const allHR       = vitals.filter(r => r.heartRate).map(r => parseFloat(r.heartRate));
  const weekSessions = weekCardio.filter(v => v > 0).length;

  const avg = arr => arr.length ? (arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(1) : '—';

  document.getElementById('stat-avg-weight').textContent = allMorningW.length ? avg(allMorningW)+' kg' : '—';
  document.getElementById('stat-avg-hr').textContent     = allHR.length ? avg(allHR) : '—';
  document.getElementById('stat-sessions').textContent   = weekSessions + ' 次';
}

function updateRing(current, target) {
  const pct = Math.min(current / target, 1);
  const C = 333;
  const fill = document.getElementById('ring-fill');
  fill.style.strokeDashoffset = C * (1 - pct);
  fill.style.stroke = pct >= 1 ? '#3dbfa0' : '#f2704a';
  document.getElementById('ring-mins').textContent  = current;
  document.getElementById('ring-label').textContent = `/ 150 分鐘`;
}

/* ── 從 Google Sheets 讀取資料（fetch + CORS）── */
async function refreshAnalytics() {
  const btn = document.querySelector('[onclick="refreshAnalytics()"]');
  const origText = btn.innerHTML;
  btn.innerHTML = '⏳ 讀取中…';
  btn.disabled = true;

  try {
    // Apps Script doGet 需在回應加 CORS header 才能用 fetch 讀取
    const res = await fetch(WEBHOOK_URL + '?action=getData&t=' + Date.now(), {
      method: 'GET',
      redirect: 'follow',
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    if (json.status === 'error') throw new Error(json.message);
    renderCharts(json.vitals || [], json.workouts || []);
    showToast('已更新：' + (json.vitals||[]).length + ' 筆生理、' + (json.workouts||[]).length + ' 筆訓練');
  } catch(err) {
    console.error('[Analytics]', err);
    showToast('讀取失敗：' + err.message, true);
  } finally {
    btn.innerHTML = origText;
    btn.disabled = false;
  }
}

/* ══════════════════════════════════════════════════════
   分頁切換
══════════════════════════════════════════════════════ */
function switchTab(tab) {
  document.querySelectorAll('.tab-panel').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
  document.getElementById(`nav-${tab}`).classList.add('active');
}

/* ══════════════════════════════════════════════════════
   工具函式
══════════════════════════════════════════════════════ */
function showToast(msg, isError=false) {
  const t = document.getElementById('toast');
  t.textContent = (isError ? '⚠ ' : '✓ ') + msg;
  t.className = 'show ' + (isError ? 'err' : 'ok');
  clearTimeout(t._tid);
  t._tid = setTimeout(() => { t.className = ''; }, 2400);
}
function formatDate(d) { return d.toISOString().slice(0,10); }
function formatTime(d) { return d.toTimeString().slice(0,5); }

/* ── 啟動 ── */
init();
</script>
